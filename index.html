<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; margin: 20px 0; }
        #authBtn { width: 100%; padding: 15px; background: #0070f3; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #memberArea { display: none; text-align: left; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: white; }
    </style>
</head>
<body>
    <img src="logo1.png" style="width: 80px;">
    <h1>Resale IQ</h1>
    
    <div class="card">
        <p id="statusMsg">Loading...</p>
        <button id="authBtn" style="display:none;">Sign In with Google</button>
        
        <div id="memberArea">
            <h3>Item Tracker</h3>
            <input type="text" id="itemInput" placeholder="Enter item name...">
            <button id="saveBtn" style="background:#0070f3; color:white; border:none; padding:10px; width:100%;">Save Item</button>
            <ul id="itemList" style="margin-top:20px;"></ul>
            <button id="logoutBtn" style="background:#444; border:none; padding:10px; color:white; border-radius:5px; margin-top:20px;">Sign Out</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const app = initializeApp({
            apiKey: "AIzaSyCHw58VHbvQxji437vYTxgakBHdRYiFVa0",
            authDomain: "resale-iq.firebaseapp.com",
            projectId: "resale-iq",
            storageBucket: "resale-iq.firebasestorage.app",
            messagingSenderId: "496480241751",
            appId: "1:496480241751:web:148d1da5cd3e322edcbb12"
        });

        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('statusMsg').innerHTML = `Welcome, <b>${user.displayName}</b>!`;
                document.getElementById('authBtn').style.display = 'none';
                document.getElementById('memberArea').style.display = 'block';
            } else {
                document.getElementById('statusMsg').innerText = "System ready.";
                document.getElementById('authBtn').style.display = 'block';
                document.getElementById('memberArea').style.display = 'none';
                document.getElementById('authBtn').onclick = () => signInWithPopup(auth, provider);
            }
        });

        document.getElementById('saveBtn').onclick = () => {
            const item = document.getElementById('itemInput').value;
            if(item) {
                const li = document.createElement('li');
                li.textContent = item;
                document.getElementById('itemList').appendChild(li);
                document.getElementById('itemInput').value = '';
            }
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
</html>
