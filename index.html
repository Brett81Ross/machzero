<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MachZero - AI Resale Estimator</title>

  <!-- iOS Link Preview & Open Graph Optimization -->
  <meta property="og:title" content="MachZero - AI Resale Estimator">
  <meta property="og:description" content="Add multiple snapshots to a single batch for immediate, expert resale values and optimized marketplace descriptions.">
  <meta property="og:image" content="https://machzero-beta.vercel.app/logo1.jpg">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    :root {
      --bg-dark: #070b19;
      --card-bg: #111a36;
      --accent-blue: #38bdf8;
      --accent-green: #10b981;
      --accent-indigo: #3b82f6;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }
    
    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      box-sizing: border-box;
    }
    
    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .header {
      text-align: center;
      margin-top: 24px;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    
    .logo {
      width: 140px;
      height: 140px;
      margin-bottom: 16px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      object-fit: cover;
      display: block;
    }
    
    .title {
      font-size: 2.2rem;
      font-weight: 900;
      margin: 0 0 8px 0;
      letter-spacing: 2px;
      color: var(--text-main);
    }
    
    .title span {
      color: var(--accent-blue);
    }
    
    .description {
      color: var(--text-muted);
      max-width: 360px;
      margin: 0 auto;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    
    .button-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--card-bg);
      padding: 16px;
      border-radius: 16px;
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }
    
    .btn {
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, background-color 0.2s;
    }
    
    .btn:active {
      transform: scale(0.98);
    }
    
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-camera {
      background-color: var(--accent-blue);
      color: #020617;
    }
    
    .btn-upload {
      background-color: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .btn-submit {
      background-color: var(--accent-green);
      color: #ffffff;
      margin-top: 4px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }
    
    .status-area {
      width: 100%;
      margin-top: 20px;
    }
    
    .loading-card {
      background-color: var(--card-bg);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    
    .loading-card p {
      margin: 0;
      font-weight: 600;
      color: var(--accent-blue);
      font-size: 1rem;
      animation: pulseText 1.5s ease-in-out infinite;
    }
    
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(56, 189, 248, 0.1);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulseText {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .error-card {
      background-color: #27161a;
      border: 1px solid #ef4444;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .error-card h4 {
      margin: 0 0 4px 0;
      color: #ef4444;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
    }
    
    .error-card p {
      margin: 0;
      font-size: 0.85rem;
      color: #fca5a5;
      word-break: break-word;
    }
    
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
      width: 100%;
    }
    
    .preview-item {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      aspect-ratio: 1 / 1;
      background-color: #020617;
    }
    
    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    
    .remove-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(15, 23, 42, 0.8);
      color: #ef4444;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      padding: 0;
    }

    .result-card {
      background-color: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    
    .result-text {
      color: #e2e8f0;
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 0.95rem;
    }
    
    footer {
      margin-top: auto;
      padding-top: 48px;
      padding-bottom: 12px;
      text-align: center;
      font-size: 0.75rem;
      color: #475569;
      width: 100%;
    }
    
    footer p {
      margin: 0;
    }
    
    footer p:first-child {
      margin-bottom: 4px;
    }
    
    #fileInput {
      display: none;
    }
  </style>

  <!-- Modern secure ES Modules mapping for front-end Google SDK deployment -->
  <script type="importmap">
    {
      "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
      }
    }
  </script>
</head>
<body>

  <div class="container">
    <div class="header">
      <img src="logo1.jpg" alt="MachZero Logo" class="logo" id="brandLogo">
      <h1 class="title">MACH<span>ZERO</span></h1>
      <p class="description">
        Add multiple pictures to your batch to get a precise appraisal. Capture different details, close-ups of signatures, or angles of your item before analyzing.
      </p>
    </div>

    <div class="button-group">
      <button class="btn btn-camera" id="cameraBtn">TAKE A PHOTO</button>
      <button class="btn btn-upload" id="uploadBtn">CHOOSE IMAGES</button>
      <button class="btn btn-submit" id="submitBtn" style="display: none;">ANALYZE PHOTO/IMAGE (0)</button>
      <input type="file" id="fileInput" accept="image/*" multiple>
    </div>

    <div class="status-area" id="statusArea">
      <div id="loadingState" class="loading-card" style="display: none; margin-bottom: 20px;">
        <div class="spinner"></div>
        <p>Analyzing Images...</p>
      </div>

      <div id="errorState" class="error-card" style="display: none;">
        <h4>Network Fault</h4>
        <p id="errorText"></p>
      </div>

      <div id="previewGrid" class="preview-grid"></div>

      <div id="resultState" class="result-card" style="display: none;">
        <div id="resultText" class="result-text"></div>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 MachZero&trade;</p>
      <p>Powered by CactusByte Studios &bull; All Rights Reserved</p>
    </footer>
  </div>

  <script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const fileInput = document.getElementById('fileInput');
    const cameraBtn = document.getElementById('cameraBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const submitBtn = document.getElementById('submitBtn');
    
    const loadingState = document.getElementById('loadingState');
    const errorState = document.getElementById('errorState');
    const errorText = document.getElementById('errorText');
    const previewGrid = document.getElementById('previewGrid');
    const resultState = document.getElementById('resultState');
    const resultText = document.getElementById('resultText');
    const brandLogo = document.getElementById('brandLogo');

    brandLogo.onerror = () => { console.error("Logo asset logo1.jpg could not be loaded."); };

    let imageQueue = [];

    cameraBtn.addEventListener('click', () => {
      errorState.style.display = 'none';
      fileInput.setAttribute('capture', 'environment');
      fileInput.click();
    });

    uploadBtn.addEventListener('click', () => {
      errorState.style.display = 'none';
      fileInput.removeAttribute('capture');
      fileInput.click();
    });

    fileInput.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      if (files.length === 0) return;

      for (const file of files) {
        const blobUrl = URL.createObjectURL(file);
        
        const queueItem = {
          id: Date.now() + Math.random().toString(36).substr(2, 5),
          blobUrl: blobUrl,
          rawParts: null
        };

        const gridItem = document.createElement('div');
        gridItem.className = 'preview-item';
        gridItem.dataset.id = queueItem.id;
        
        const imgNode = document.createElement('img');
        imgNode.src = blobUrl;
        
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.innerText = '×';
        removeBtn.onclick = () => removeImageFromBatch(queueItem.id);

        gridItem.appendChild(imgNode);
        gridItem.appendChild(removeBtn);
        previewGrid.appendChild(gridItem);

        imageQueue.push(queueItem);

        const reader = new FileReader();
        reader.onloadend = () => {
          compressAndPrepImage(reader.result, (genAIPart) => {
            queueItem.rawParts = genAIPart;
          });
        };
        reader.readAsDataURL(file);
      }

      updateSubmitButtonState();
      fileInput.value = ''; 
    });

    function compressAndPrepImage(base64Str, callback) {
      const img = new Image();
      img.src = base64Str;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        const max_size = 800; 

        if (width > height) {
          if (width > max_size) {
            height *= max_size / width;
            width = max_size;
          }
        } else {
          if (height > max_size) {
            width *= max_size / height;
            height = max_size;
          }
        }

        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        const optimizedBase64 = canvas.toDataURL('image/jpeg', 0.78);
        const splitData = optimizedBase64.split(',');
        
        callback({
          inlineData: {
            data: splitData[1],
            mimeType: "image/jpeg"
          }
        });
      };
    }

    function removeImageFromBatch(id) {
      const index = imageQueue.findIndex(item => item.id === id);
      if (index !== -1) {
        URL.revokeObjectURL(imageQueue[index].blobUrl);
        imageQueue.splice(index, 1);
      }
      const element = previewGrid.querySelector(`[data-id="${id}"]`);
      if (element) element.remove();
      updateSubmitButtonState();
    }

    function updateSubmitButtonState() {
      if (imageQueue.length > 0) {
        submitBtn.style.display = 'block';
        submitBtn.innerText = `ANALYZE PHOTO/IMAGE (${imageQueue.length})`;
      } else {
        submitBtn.style.display = 'none';
      }
    }

    submitBtn.addEventListener('click', async () => {
      const uncompleted = imageQueue.some(item => !item.rawParts);
      if (uncompleted) {
        showError("Images are still processing. Please press analyze again.");
        return;
      }

      setLoading(true);
      errorState.style.display = 'none';
      resultState.style.display = 'none';

      const contentPayload = imageQueue.map(item => item.rawParts);
      await sendDirectToGemini(contentPayload);
    });

    async function sendDirectToGemini(contentPartsArray) {
      try {
        const keyFetch = await fetch('/api/analyze');
        if (!keyFetch.ok) {
          throw new Error("Could not retrieve secure credentials from backend handoff.");
        }
        const keyData = await keyFetch.json();
        const activeKey = keyData.key;

        const genAI = new GoogleGenerativeAI(activeKey);
        const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" });

        const appraisalPrompt = `You are an expert appraiser and high-end resale evaluator. 
Analyze the provided image configurations carefully. Use these multiple angles to check frame details, signature details, canvas texture, condition details, and overall scale.

Proactively calculate and deduce the estimated physical dimensions of the object based on contextual clues, perspective, aspect ratio, and object classification. Do not prompt the user for sizing information.

Provide your output using this exact numbered structure:
1. Estimated Resale Market Value Range ($ Min - Max Value)
2. Identified Item Title & Era/Year
3. Valuation Factors (Why it's worth this price point based on details or visible indicators)
4. Recommended Marketplace Channels (e.g., eBay, Mercari, specialty forums)
5. Exactly What To Copy And Paste into a sale add/post (Generate a polished, clean item description optimized for rapid resale, featuring calculated measurements, condition specifics, and target keywords)

Be thorough, precise, and direct.`;

        contentPartsArray.push(appraisalPrompt);

        const result = await model.generateContent(contentPartsArray);
        const response = await result.response;
        const text = response.text();

        resultText.textContent = text;
        resultState.style.display = 'block';
      } catch (err) {
        console.error(err);
        showError(`Analysis Error: ${err.message}`);
      } finally {
        setLoading(false);
      }
    }

    function setLoading(isLoading) {
      if (isLoading) {
        loadingState.style.display = 'flex';
        cameraBtn.disabled = true;
        uploadBtn.disabled = true;
        submitBtn.disabled = true;
      } else {
        loadingState.style.display = 'none';
        cameraBtn.disabled = false;
        uploadBtn.disabled = false;
        submitBtn.disabled = false;
      }
    }

    function showError(message) {
      errorText.textContent = message;
      errorState.style.display = 'block';
    }
  </script>
  <script defer src="/_vercel/insights/script.js"></script>

</body>
</html>
