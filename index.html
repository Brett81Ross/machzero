<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Resale IQ</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --accent: #0070f3; --bg: #050505; --card: rgba(255, 255, 255, 0.08); }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; }
        .header { margin: 30px 0; text-align: center; }
        .logo { max-width: 120px; margin-bottom: 10px; }
        .card { background: var(--card); backdrop-filter: blur(15px); border-radius: 24px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 100px; }
        #imagePreview { width: 100%; border-radius: 16px; display: none; margin-bottom: 20px; }
        .action-bar { position: fixed; bottom: 30px; width: 90%; max-width: 400px; display: flex; gap: 10px; flex-direction: column; }
        .btn { padding: 18px; border-radius: 16px; border: none; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--accent); color: white; }
        .btn-secondary { background: #333; color: white; }
        #result { color: #ccc; line-height: 1.6; font-size: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="logo1.png" alt="Resale IQ Logo" class="logo">
            <h1>Resale IQ</h1>
        </div>
        <div class="card">
            <img id="imagePreview">
            <div id="result">Select an item to begin valuation.</div>
        </div>
    </div>

    <div class="action-bar">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
        <input type="file" id="galleryInput" accept="image/*" style="display: none;">
        
        <button class="btn btn-main" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
        <button class="btn btn-secondary" onclick="document.getElementById('galleryInput').click()">📂 Choose from Gallery</button>
        <button id="analyzeBtn" class="btn btn-main" style="display:none; background: #28a745;" onclick="analyzeImage()">🔍 Get Value</button>
    </div>

    <script>
        let resizedBase64 = "";
        
        // Unified function to handle images from both inputs
        function processImage(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 800;
                    canvas.height = (800 / img.width) * img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resizedBase64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                    document.getElementById('imagePreview').src = canvas.toDataURL();
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('analyzeBtn').style.display = 'block';
                    document.getElementById('result').innerText = "Item loaded. Ready to analyze.";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('cameraInput').addEventListener('change', e => processImage(e.target.files[0]));
        document.getElementById('galleryInput').addEventListener('change', e => processImage(e.target.files[0]));

        async function analyzeImage() {
            const res = document.getElementById('result');
            res.innerText = "Analyzing market value...";
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: resizedBase64 })
            });
            const data = await response.json();
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                res.innerText = data.candidates[0].content.parts[0].text;
            } else {
                res.innerText = "Error processing image.";
            }
        }
    </script>
</body>
</html>
