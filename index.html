<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Resale IQ</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --accent: #0070f3; --bg: #050505; --card: rgba(255, 255, 255, 0.08); }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; }
        .header { margin: 40px 0; text-align: center; }
        .card { background: var(--card); backdrop-filter: blur(15px); border-radius: 24px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; }
        #imagePreview { width: 100%; border-radius: 16px; display: none; margin-bottom: 20px; }
        .action-bar { position: fixed; bottom: 30px; width: 90%; max-width: 400px; }
        .btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--accent); color: white; margin-bottom: 10px; }
        #result { color: #ccc; line-height: 1.6; font-size: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>Resale IQ</h1></div>
        <div class="card">
            <img id="imagePreview">
            <div id="result">Select an item to begin valuation.</div>
        </div>
    </div>

    <div class="action-bar">
        <input type="file" id="cameraInput" accept="image/*" style="display: none;">
        <button class="btn btn-main" onclick="document.getElementById('cameraInput').click()">📷 Scan Item</button>
        <button id="analyzeBtn" class="btn" style="display:none; background: #333; color: white;" onclick="analyzeImage()">🔍 Get Value</button>
    </div>

    <script>
        let resizedBase64 = "";
        document.getElementById('cameraInput').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 800;
                    canvas.height = (800 / img.width) * img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resizedBase64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                    document.getElementById('imagePreview').src = canvas.toDataURL();
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('analyzeBtn').style.display = 'block';
                    document.getElementById('result').innerText = "Item loaded. Ready to analyze.";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        });

        async function analyzeImage() {
            const res = document.getElementById('result');
            res.innerText = "Analyzing market value...";
            const response = await fetch('/api/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: resizedBase64 })
            });
            const data = await response.json();
            res.innerText = data.candidates[0].content.parts[0].text;
        }
    </script>
</body>
</html>
