<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Resale IQ</title>
    <link rel="apple-touch-icon" href="logo1.png">
    <style>
        :root { --accent: #0070f3; --bg: #050505; --card: #111; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; text-align: center; }
        .logo { width: 80px; margin-bottom: 10px; }
        h1 { font-size: 32px; margin: 0; }
        p { color: #888; margin-bottom: 30px; }
        .upload-card { background: var(--card); border: 2px dashed #333; padding: 40px 20px; border-radius: 24px; margin-bottom: 20px; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .btn { padding: 20px; border-radius: 16px; border: none; font-weight: 600; cursor: pointer; }
        .btn-main { background: var(--accent); color: white; }
        .btn-secondary { background: #222; color: white; border: 1px solid #444; }
        .hidden { display: none; }
        #result { margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo1.png" class="logo">
        <h1>Snap it. Sell it.</h1>
        <p>Take or upload a photo — AI does the rest.</p>

        <div class="upload-card">
            <img id="imagePreview" style="width:100%; display:none; border-radius:12px; margin-bottom:15px;">
            <div id="ui-buttons" class="button-grid">
                <button class="btn btn-main" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
                <button class="btn btn-secondary" onclick="document.getElementById('galleryInput').click()">📂 Choose File</button>
            </div>
            <div id="result"></div>
        </div>

        <input type="file" id="cameraInput" class="hidden" accept="image/*" capture="environment">
        <input type="file" id="galleryInput" class="hidden" accept="image/*">
        
        <button id="analyzeBtn" class="btn btn-main" style="width:100%; display:none; margin-bottom:10px;" onclick="analyzeImage()">🔍 Get Value</button>
        <button id="copyBtn" class="btn btn-secondary" style="width:100%; display:none;" onclick="copyListing()">📋 Copy Listing</button>
    </div>

    <script>
        let resizedBase64 = "";

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 800; canvas.height = (800 / img.width) * img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resizedBase64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                    document.getElementById('imagePreview').src = canvas.toDataURL();
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('analyzeBtn').style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('cameraInput').onchange = (e) => e.target.files[0] && handleFile(e.target.files[0]);
        document.getElementById('galleryInput').onchange = (e) => e.target.files[0] && handleFile(e.target.files[0]);

        async function analyzeImage() {
            const btn = document.getElementById('analyzeBtn');
            const res = document.getElementById('result');
            btn.disabled = true;
            res.innerHTML = "<p>Analyzing... please wait.</p>";

            try {
                const response = await fetch('/api/analyze', { 
                    method: 'POST', headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ image: resizedBase64 })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                let text = data.candidates[0].content.parts[0].text;
                res.innerHTML = text.replace(/\n/g, '<br>');
                document.getElementById('copyBtn').style.display = 'block';
            } catch (err) { res.innerHTML = "Error analyzing. Please check your API key in Vercel settings."; }
            finally { btn.disabled = false; }
        }
