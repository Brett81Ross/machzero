<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Resale IQ</title>
    <style>
        :root { --accent: #0070f3; --bg: #050505; --card: rgba(255, 255, 255, 0.08); }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; padding-bottom: 280px; }
        .header { margin: 30px 0; text-align: center; }
        .logo { max-width: 120px; margin-bottom: 10px; }
        .card { background: var(--card); backdrop-filter: blur(15px); border-radius: 24px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; }
        #imagePreview { width: 100%; border-radius: 16px; display: none; margin-bottom: 20px; }
        #result { color: #ccc; line-height: 1.6; font-size: 15px; text-align: left; }
        #result h3 { color: var(--accent); margin-top: 25px; border-bottom: 1px solid #333; padding-bottom: 5px; }

        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .btn { width: 100%; max-width: 400px; padding: 18px; border-radius: 16px; border: none; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--accent); color: white; }
        .btn-secondary { background: #333; color: white; }
        .btn-success { background: #28a745; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="logo1.png" alt="Resale IQ Logo" class="logo">
            <h1>Resale IQ</h1>
        </div>
        <div class="card">
            <img id="imagePreview">
            <div id="result">Select an item to begin valuation.</div>
        </div>
    </div>

    <div class="action-bar">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
        <input type="file" id="galleryInput" accept="image/*" style="display: none;">
        
        <button class="btn btn-main" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
        <button class="btn btn-secondary" onclick="document.getElementById('galleryInput').click()">📂 Choose from Gallery</button>
        <button id="analyzeBtn" class="btn btn-success" style="display:none;" onclick="analyzeImage()">🔍 Get Value</button>
        <button id="copyBtn" class="btn btn-secondary" style="display:none; background: #555;" onclick="copyListing()">📋 Copy Listing Data</button>
    </div>

    <script>
        let resizedBase64 = "";

        function processImage(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 800;
                    canvas.height = (800 / img.width) * img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resizedBase64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                    const preview = document.getElementById('imagePreview');
                    preview.src = canvas.toDataURL();
                    preview.style.display = 'block';
                    document.getElementById('analyzeBtn').style.display = 'block';
                    document.getElementById('result').innerText = "Image loaded. Tap 'Get Value' to proceed.";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('cameraInput').addEventListener('change', e => processImage(e.target.files[0]));
        document.getElementById('galleryInput').addEventListener('change', e => processImage(e.target.files[0]));

        async function analyzeImage() {
            const btn = document.getElementById('analyzeBtn');
            const res = document.getElementById('result');
            const copyBtn = document.getElementById('copyBtn');
            
            const steps = ["Identifying...", "Evaluating Market...", "Writing Description...", "Finalizing Tips..."];
            btn.disabled = true;
            let i = 0;
            const interval = setInterval(() => { btn.innerText = steps[i % steps.length]; i++; }, 1200);
            
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: resizedBase64 })
                });
                const data = await response.json();
                clearInterval(interval);
                
                if (data.candidates?.[0]?.content?.parts?.[0]?.text) {
                    res.innerHTML = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
                    copyBtn.style.display = 'block';
                    res.scrollIntoView({ behavior: 'smooth' });
                } else {
                    res.innerText = "Error: Could not process image.";
                }
            } catch (err) {
                clearInterval(interval);
                res.innerText = "Connection Error: " + err.message;
            } finally {
                btn.innerText = "🔍 Get Value";
                btn.disabled = false;
            }
        }

        function copyListing() {
            const res = document.getElementById('result').innerText;
            const listingData = res.split("📋 Listing Data")[1] || "No listing data found.";
            navigator.clipboard.writeText(listingData.trim()).then(() => alert("Copied! Paste into your selling app."));
        }
    </script>
</body>
</html>
