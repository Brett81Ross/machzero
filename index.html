<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; margin: 20px 0; }
        #authBtn { width: 100%; padding: 15px; background: #0070f3; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #memberArea { display: none; }
        .btn { width: 100%; padding: 15px; background: #222; color: white; border: 1px solid #444; border-radius: 10px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <img src="logo1.png" style="width: 80px;">
    <h1>Resale IQ</h1>
    
    <div class="card">
        <p id="statusMsg">Checking system...</p>
        <button id="authBtn" style="display:none;">Sign In with Google</button>
        
        <div id="memberArea">
            <h3>Your Dashboard</h3>
            <p>Welcome, <span id="userName"></span>!</p>
            <button id="logoutBtn" class="btn" style="background:#444;">Sign Out</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const app = initializeApp({
            apiKey: "AIzaSyCHw58VHbvQxji437vYTxgakBHdRYiFVa0",
            authDomain: "resale-iq.firebaseapp.com",
            projectId: "resale-iq",
            storageBucket: "resale-iq.firebasestorage.app",
            messagingSenderId: "496480241751",
            appId: "1:496480241751:web:148d1da5cd3e322edcbb12"
        });

        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => {
            const status = document.getElementById('statusMsg');
            const authBtn = document.getElementById('authBtn');
            const memberArea = document.getElementById('memberArea');
            
            if (user) {
                status.style.display = 'none';
                authBtn.style.display = 'none';
                memberArea.style.display = 'block';
                document.getElementById('userName').innerText = user.displayName;
            } else {
                status.innerText = "System ready.";
                authBtn.style.display = 'block';
                memberArea.style.display = 'none';
                authBtn.onclick = () => signInWithPopup(auth, provider);
            }
        });

        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
</html>
