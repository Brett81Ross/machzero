<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MachZero - AI Asset Appraiser</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #f0f6fc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .logo-container {
            margin-top: 30px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .brand-logo {
            width: 120px;
            height: auto;
            display: block;
        }
        .brand-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 10px 0;
            text-transform: uppercase;
            color: #ffffff;
        }
        .brand-title span {
            color: #58a6ff;
        }
        .tagline {
            font-size: 14px;
            color: #8b949e;
            line-height: 1.5;
            padding: 0 15px;
            margin-bottom: 30px;
        }
        .action-card {
            background-color: #161b22;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid #30363d;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8b949e;
            margin-bottom: 8px;
        }
        .text-input {
            width: 100%;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            color: #f0f6fc;
            box-sizing: border-box;
        }
        .text-input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .btn {
            display: block;
            width: 100%;
            background-color: #58a6ff;
            color: #0d1117;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
        }
        .btn:last-child {
            margin-bottom: 0;
        }
        .btn-secondary {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }
        .hidden-input {
            display: none;
        }
        .result-card {
            background-color: #161b22;
            border-left: 4px solid #58a6ff;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            margin-top: 20px;
        }
        .result-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .result-title {
            font-size: 13px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            font-weight: bold;
        }
        .copy-btn {
            background-color: #0d1117;
            color: #58a6ff;
            border: 1px solid #30363d;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .result-text {
            font-size: 15px;
            line-height: 1.6;
            margin: 0;
            white-space: pre-wrap;
            color: #c9d1d9;
        }
        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #8b949e;
            letter-spacing: 0.5px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="logo-container">
            <img src="logo1.jpg" alt="MachZero Logo" class="brand-logo">
        </div>
        <div class="brand-title">MACH<span>ZERO</span></div>
        <div class="tagline">
            Snap a photo or upload an image to instantly estimate its resale market value. Know what it's worth before you buy, sell, or pass it up.
        </div>

        <div class="action-card">
            <div class="input-group">
                <label class="input-label" for="usageMetrics">Hours / Mileage (Optional)</label>
                <input type="text" id="usageMetrics" class="text-input" placeholder="e.g. 1500 hrs or 125k miles">
            </div>

            <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden-input" onchange="handleFiles(this.files)">
            <input type="file" id="fileInput" accept="image/*" class="hidden-input" onchange="handleFiles(this.files)">

            <button class="btn" onclick="document.getElementById('cameraInput').click()">Take Photo</button>
            <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">Upload Image</button>
        </div>

        <div class="result-card" id="outputCard" style="display: none;">
            <div class="result-title-row">
                <p class="result-title" id="statusHeader">Analysis Output</p>
                <button class="copy-btn" id="copyButton" onclick="copyToClipboard()">Copy</button>
