<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; margin: 20px auto; max-width: 400px; }
        .btn { width: 100%; padding: 15px; background: #222; color: white; border: 1px solid #444; border-radius: 10px; margin-top: 10px; cursor: pointer; font-size: 16px; display: block; }
        .analyze-btn { background: #0070f3 !important; font-weight: bold; margin-top: 20px; }
        .copy-btn { background: #28a745 !important; margin-top: 10px; display: none; }
        .upgrade-btn { background: #ff9f00 !important; margin-top: 10px; display: none; font-weight: bold; }
        #preview { width: 100%; border-radius: 10px; margin-top: 15px; display: none; }
        #status { margin-top: 15px; font-size: 14px; color: #888; }
        #result { margin-top: 20px; padding: 15px; background: #1a1a1a; border-radius: 10px; text-align: left; white-space: pre-wrap; color: #ddd; display: none; }
    </style>
</head>
<body>

    <img src="logo1.png" style="width: 80px;">
    <h1>Resale IQ</h1>
    
    <div class="card">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        
        <button class="btn" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
        <button class="btn" onclick="document.getElementById('fileInput').click()">📁 Choose File</button>
        
        <img id="preview" alt="Preview">
        <button id="analyzeBtn" class="btn analyze-btn">Analyze Item</button>
        
        <div id="status"></div>
        <div id="result"></div>
        
        <button id="copyBtn" class="btn copy-btn">📋 Copy Listing Text</button>
        <a id="upgradeBtn" href="YOUR_STRIPE_PAYMENT_LINK_HERE" class="btn upgrade-btn">🚀 Upgrade to Unlimited</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cameraInput = document.getElementById('cameraInput');
            const fileInput = document.getElementById('fileInput');
            const analyzeBtn = document.getElementById('analyzeBtn');
            const copyBtn = document.getElementById('copyBtn');
            const upgradeBtn = document.getElementById('upgradeBtn');
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            const preview = document.getElementById('preview');

            let currentFile = null;

            function handleFile(file) {
                if (!file) return;
                currentFile = file;
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                status.innerText = "File ready. Click Analyze.";
            }

            cameraInput.onchange = (e) => handleFile(e.target.files[0]);
            fileInput.onchange = (e) => handleFile(e.target.files[0]);

            analyzeBtn.onclick = async () => {
                if (!currentFile) return alert("Select a photo first!");
                status.innerText = "Analyzing...";
                analyzeBtn.disabled = true;

                const img = new Image();
                img.src = URL.createObjectURL(currentFile);
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const scale = 800 / img.width;
                    canvas.width = 800; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];

                    try {
                        const res = await fetch('/api/analyze', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ imageBase64: base64 })
                        });

                        // Handle monetization gating
                        if (res.status === 403) {
                            status.innerText = "Free scans used up for this month.";
                            upgradeBtn.style.display = 'block';
                            return;
                        }

                        const data = await res.json();
                        if (data.candidates && data.candidates[0].content) {
                            result.innerText = data.candidates[0].content.parts[0].text;
                            result.style.display = 'block';
                            copyBtn.style.display = 'block';
                            status.innerText = "Analysis Complete!";
                        }
                    } catch (e) {
                        status.innerText = "Error processing. Please try again.";
                    } finally {
                        analyzeBtn.disabled = false;
                    }
                };
            };

            copyBtn.onclick = () => {
                navigator.clipboard.writeText(result.innerText);
                alert("Copied to clipboard!");
            };
        });
    </script>
</body>
</html>
