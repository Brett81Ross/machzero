<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResaleIQ</title>
    <style>
        html, body { margin: 0; padding: 0; min-height: 100%; background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .app-container { max-width: 480px; width: 100%; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .brand-header { text-align: center; padding: 20px 0; }
        .main-logo { width: 150px; height: 150px; object-fit: contain; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; font-size: 1rem; font-weight: 600; border: none; cursor: pointer; margin-bottom: 10px; color: #ffffff; text-align: center; display: block; }
        .btn-blue { background-color: #007aff; }
        .btn-green { background-color: #34c759; }
        .btn-calc { background-color: #ff9500; }
        .input-group { margin-bottom: 15px; position: relative; }
        .input-row { display: flex; align-items: center; gap: 10px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; font-size: 1rem; }
        .info-btn { background: #444; border-radius: 50%; width: 30px; height: 30px; border: none; color: white; cursor: pointer; flex-shrink: 0; }
        .hidden-uploader { position: absolute; opacity: 0; width: 0; height: 0; }
        #status-display, #profit-display { background-color: #1c1c1e; border-radius: 12px; padding: 20px; margin-top: 15px; border-left: 4px solid #007aff; white-space: pre-wrap; display: none; }
        #profit-display { border-left-color: #ff9500; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="brand-header"><img src="logo1.png" alt="ResaleIQ" class="main-logo"></div>
        
        <input type="file" id="file-input" class="hidden-uploader" accept="image/*">
        <button class="btn btn-blue" id="gallery-btn">Select Photos</button>
        <button class="btn btn-green" id="camera-btn">Take Photo</button>
        <div id="status-display"></div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <div class="input-group">
            <div class="input-row">
                <input type="number" id="cost-input" placeholder="Cost Source / Source Cost">
                <button class="info-btn" onclick="alert('Enter the total amount you paid for the item.')">ℹ️</button>
            </div>
        </div>
        <div class="input-group">
            <div class="input-row">
                <input type="number" id="price-input" placeholder="Expected Selling Price">
                <button class="info-btn" onclick="alert('Enter your expected sale price to calculate profit.')">ℹ️</button>
            </div>
        </div>
        <button class="btn btn-calc" onclick="calculateProfit()">Calculate Net Profit</button>
        <div id="profit-display"></div>
    </div>

    <script>
        const API_KEY = 'AIzaSyBzcnjEsoze4PGMiTD6usC4PXIiYKUlJK8';

        // Photo Upload Logic
        document.getElementById('gallery-btn').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('camera-btn').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => upload(e.target.files[0]));

        async function upload(file) {
            const status = document.getElementById('status-display');
            status.style.display = 'block';
            status.textContent = "Analyzing item...";
            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Analyze this item and provide: 1. Description, 2. Market Value, 3. Suggested Resale Price." }, { inline_data: { mime_type: "image/jpeg", data: base64Data } }] }]
                        })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    status.textContent = data.candidates[0].content.parts[0].text;
                } catch (err) {
                    status.textContent = "Error: " + err.message;
                }
            };
            reader.readAsDataURL(file);
        }

        // Profit Calculator Logic
        function calculateProfit() {
            const cost = parseFloat(document.getElementById('cost-input').value);
            const price = parseFloat(document.getElementById('price-input').value);
            const display = document.getElementById('profit-display');
            
            if (isNaN(cost) || isNaN(price)) {
                display.style.display = 'block';
                display.textContent = "Please enter valid numbers for both cost and price.";
                return;
            }
            const profit = price - cost;
            display.style.display = 'block';
            display.textContent = `Net Profit: $${profit.toFixed(2)}`;
        }
    </script>
</body>
</html>
