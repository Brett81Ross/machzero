<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        :root {
            --primary: #0070f3;
            --bg: #000000;
            --text: #ffffff;
            --secondary: #333333;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .logo { max-width: 200px; margin-bottom: 20px; }
        h1 { margin-bottom: 10px; }
        
        .btn-group { margin: 20px 0; }
        .custom-btn {
            display: block;
            width: 80%;
            margin: 10px auto;
            padding: 15px;
            background: var(--secondary);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        .btn-primary { background: var(--primary); }

        #imagePreview { 
            max-width: 100%; 
            margin-top: 20px; 
            border-radius: 10px;
            display: none;
            border: 2px solid var(--secondary);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="Logo.png" alt="Resale IQ Logo" class="logo">
        <h1>Resale IQ</h1>
        <p>Your AI-powered resale assistant.</p>

        <div class="btn-group">
            <button class="custom-btn btn-primary" onclick="document.getElementById('cameraInput').click()">
                📷 Take Photo
            </button>
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">

            <button class="custom-btn" onclick="document.getElementById('fileInput').click()">
                📂 Choose from Gallery
            </button>
            <input type="file" id="fileInput" accept="image/*" style="display: none;">
        </div>

        <img id="imagePreview" alt="Preview">
    </div>

    <script>
        function handleImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = e.target.result;
                    preview.style.display = 'inline-block';
                }
                reader.readAsDataURL(file);
            }
        }
        document.getElementById('cameraInput').addEventListener('change', handleImage);
        document.getElementById('fileInput').addEventListener('change', handleImage);
    </script>
</body>
</html>
