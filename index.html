<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Resale IQ</title>
    <style>
        :root { --accent: #0070f3; --bg: #050505; --card: rgba(255, 255, 255, 0.08); }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; line-height: 1.6; font-size: 18px; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; padding-bottom: 300px; }
        .header { text-align: center; margin: 30px 0; }
        .logo { max-width: 140px; }
        .card { background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid #333; margin-bottom: 20px; }
        h3 { color: var(--accent); font-size: 22px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .links-box, .listing-data-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 16px; margin-top: 20px; }
        .listing-data-box { border: 2px dashed var(--accent); }
        .action-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: #000; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .btn { width: 100%; max-width: 450px; padding: 20px; border-radius: 16px; border: none; font-weight: 700; font-size: 18px; cursor: pointer; }
        .btn-main { background: var(--accent); color: white; }
        .btn-secondary { background: #444; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="logo1.png" class="logo">
            <h1>Resale IQ</h1>
        </div>
        <div class="card">
            <img id="imagePreview" style="width: 100%; border-radius: 16px; display: none;">
            <div id="result">Tap a button to start.</div>
        </div>
    </div>

    <div class="action-bar">
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
        <input type="file" id="galleryInput" accept="image/*" style="display: none;">
        <button class="btn btn-main" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
        <button class="btn btn-secondary" onclick="document.getElementById('galleryInput').click()">📂 Choose Photo</button>
        <button id="analyzeBtn" class="btn btn-main" style="display:none; background: #28a745;" onclick="analyzeImage()">🔍 Get Value</button>
        <button id="copyBtn" class="btn btn-secondary" style="display:none; background: #555;" onclick="copyListing()">📋 Copy Listing Data</button>
    </div>

    <script>
        let resizedBase64 = "";
        function processImage(file) {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 800; canvas.height = (800 / img.width) * img.height;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resizedBase64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                    document.getElementById('imagePreview').src = canvas.toDataURL();
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('analyzeBtn').style.display = 'block';
                    document.getElementById('result').innerText = "Item loaded. Ready to get value.";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        document.getElementById('cameraInput').onchange = e => e.target.files[0] && processImage(e.target.files[0]);
        document.getElementById('galleryInput').onchange = e => e.target.files[0] && processImage(e.target.files[0]);

        async function analyzeImage() {
            const btn = document.getElementById('analyzeBtn');
            const res = document.getElementById('result');
            btn.disabled = true; btn.innerText = "Analyzing...";
            try {
                const response = await fetch('/api/analyze', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ image: resizedBase64 })});
                const data = await response.json();
                let text = data.candidates[0].content.parts[0].text;
                
                // Formats the response into blocks
                text = text.replace("### 🔗 Live Market Comparisons", '<div class="links-box"><h3>🔗 Live Market Comparisons</h3>');
                text = text.replace("### 📋 Listing Data (Ready to Copy)", '</div><div class="listing-data-box"><h3>📋 Listing Data</h3>');
                text = text.replace("Title:", "<strong>Title:</strong>").replace("Price:", "<strong>Price:</strong>").replace("Description:", "<strong>Description:</strong>") + '</div>';
                
                res.innerHTML = text.replace(/\n/g, '<br>');
                document.getElementById('copyBtn').style.display = 'block';
                res.scrollIntoView({ behavior: 'smooth' });
            } catch (err) { res.innerText = "Error processing image."; } finally { btn.innerText = "🔍 Get Value"; btn.disabled = false; }
        }

        function copyListing() {
            const el = document.querySelector('.listing-data-box');
            if (el) { navigator.clipboard.writeText(el.innerText).then(() => alert("Copied to clipboard!")); }
        }
    </script>
</body>
</html>
