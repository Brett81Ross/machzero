<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; margin: 20px auto; max-width: 400px; }
        .btn { width: 100%; padding: 15px; background: #222; color: white; border: 1px solid #444; border-radius: 10px; margin-top: 10px; cursor: pointer; font-size: 16px; }
        .analyze-btn { background: #0070f3 !important; font-weight: bold; }
        #result { margin-top: 20px; padding: 15px; background: #1a1a1a; border-radius: 10px; text-align: left; white-space: pre-wrap; color: #ddd; }
    </style>
</head>
<body>
    <img src="logo1.png" style="width: 80px;">
    <h1>Resale IQ</h1>
    <div class="card">
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        <button class="btn" onclick="document.getElementById('fileInput').click()">📷 Take Photo / Upload</button>
        <button id="analyzeBtn" class="btn analyze-btn">Analyze Item</button>
        <div id="result">Ready</div>
    </div>
    <script>
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("Select a photo first!");
            document.getElementById('result').innerText = "Processing...";
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 800; canvas.height = img.height * (800 / img.width);
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                    try {
                        const response = await fetch(window.location.origin + '/api/analyze', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ imageBase64: base64 })
                        });
                        const data = await response.json();
                        if (data.candidates && data.candidates[0].content) {
                            document.getElementById('result').innerText = data.candidates[0].content.parts[0].text;
                        } else {
                            document.getElementById('result').innerText = "Raw AI Response: " + JSON.stringify(data);
                        }
                    } catch (err) {
                        document.getElementById('result').innerText = "Error: Backend unreachable.";
                    }
                };
            };
        });
    </script>
</body>
</html>
