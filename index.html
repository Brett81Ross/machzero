<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResaleIQ</title>
    <style>
        html, body { margin: 0; padding: 0; min-height: 100%; background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .app-container { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        .brand-header { width: 100%; text-align: center; padding: 20px 0; background-color: #000; }
        .main-logo { width: 150px; height: 150px; object-fit: contain; margin: 0 auto; display: block; }
        .promo-banner { border-bottom: 1px solid #333; color: #ffffff; text-align: center; padding: 12px; font-size: 0.85rem; }
        .content-area { flex: 1; padding: 20px; }
        .profit-card { background-color: #161616; border-radius: 16px; padding: 24px; text-align: center; margin-bottom: 20px; position: relative; }
        .app-input { width: 100%; background-color: #161616; border: 1px solid #333; border-radius: 12px; padding: 16px; font-size: 1rem; color: #ffffff; box-sizing: border-box; margin-bottom: 16px; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; font-size: 1rem; font-weight: 600; border: none; cursor: pointer; color: #ffffff; margin-bottom: 12px; }
        .btn-blue { background-color: #007aff; }
        .btn-green { background-color: #34c759; }
        #status-display { background-color: #1c1c1e; border-radius: 12px; padding: 20px; margin: 16px 0; font-size: 0.95rem; border-left: 4px solid #007aff; display: none; white-space: pre-wrap; }
        .hidden-uploader { position: absolute !important; opacity: 0 !important; width: 1px !important; height: 1px !important; overflow: hidden !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand-header">
            <img src="logo1.png" alt="ResaleIQ" class="main-logo">
        </div>

        <div class="content-area">
            <div class="profit-card">
                <p style="font-size: 2rem; font-weight: bold; margin: 0;">$0.00</p>
            </div>

            <input type="file" id="file-input" class="hidden-uploader" accept="image/*">
            <button class="btn btn-blue" onclick="document.getElementById('file-input').click()">Analyze Image</button>

            <div id="status-display"></div>
        </div>
    </div>

    <script>
        const API_KEY = "AIzaSyCp54LGv8iu-IxPbpaoakU83OZNMheErCA";

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const status = document.getElementById('status-display');
            status.style.display = 'block';
            status.textContent = "Step 1: Reading file...";

            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];
                status.textContent = "Step 2: Sending to AI...";
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Analyze this for resale value." },
                                    { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                                ]
                            }]
                        })
                    });

                    if (!response.ok) throw new Error("API responded with " + response.status);
                    
                    const data = await response.json();
                    status.textContent = data.candidates[0].content.parts[0].text;
                } catch (err) {
                    status.textContent = "Error: " + err.message;
                    status.style.borderColor = "#ff3b30";
                }
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
