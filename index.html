<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResaleIQ</title>
    <style>
        html, body { margin: 0; padding: 0; min-height: 100%; background-color: #000000; color: #ffffff; font-family: sans-serif; }
        .app-container { max-width: 480px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .brand-header { text-align: center; padding: 20px 0; }
        .main-logo { width: 150px; height: 150px; object-fit: contain; }
        .btn { width: 100% !important; padding: 16px !important; border-radius: 12px !important; font-size: 1rem !important; font-weight: 600 !important; border: none !important; cursor: pointer !important; margin-bottom: 12px !important; color: #ffffff !important; display: block !important; text-align: center; }
        .btn-blue { background-color: #007aff !important; }
        .btn-green { background-color: #34c759 !important; }
        .btn-grey { background-color: #555555 !important; }
        .hidden-uploader { position: absolute; opacity: 0; width: 0; height: 0; }
        #status-display { background-color: #1c1c1e; border-radius: 12px; padding: 20px; margin-top: 20px; border-left: 4px solid #007aff; display: block; white-space: pre-wrap; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="brand-header"><img src="logo1.png" alt="ResaleIQ" class="main-logo"></div>
        <input type="file" id="file-input" class="hidden-uploader" accept="image/*">
        <button class="btn btn-blue" id="gallery-btn">Select Photos</button>
        <button class="btn btn-green" id="camera-btn">Take Photo</button>
        <button class="btn btn-grey" onclick="listModels()">Check Available Models</button>
        <div id="status-display">Ready.</div>
    </div>

    <script>
        const API_KEY = 'AIzaSyBzcnjEsoze4PGMiTD6usC4PXIiYKUlJK8';

        function updateStatus(text) {
            const status = document.getElementById('status-display');
            status.textContent = text;
        }

        async function listModels() {
            updateStatus("Fetching models...");
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                updateStatus("Available Models:\n" + data.models.map(m => m.name).join('\n'));
            } catch (err) {
                updateStatus("Error listing models: " + err.message);
            }
        }

        document.getElementById('gallery-btn').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('camera-btn').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => upload(e.target.files[0]));

        async function upload(file) {
            updateStatus("Analyzing item...");
            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Analyze this item and provide: 1. Description, 2. Market Value, 3. Suggested Resale Price." },
                                    { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                                ]
                            }]
                        })
                    });
                    
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    updateStatus(data.candidates[0].content.parts[0].text);
                } catch (err) {
                    updateStatus("Error: " + err.message);
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
