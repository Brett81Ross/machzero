<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; margin: 20px 0; }
        #authBtn { width: 100%; padding: 15px; background: #0070f3; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <img src="logo1.png" style="width: 80px;">
    <h1>Resale IQ</h1>
    <div class="card">
        <p id="statusMsg">Loading system...</p>
        <button id="authBtn" style="display:none;">Sign In with Google</button>
        <div id="memberArea" style="display:none;">
            <h3>Your Dashboard</h3>
            <button id="logoutBtn">Sign Out</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        try {
            const app = initializeApp({
                apiKey: "AIzaSyCHw58VHbvQxji437vYTxgakBHdRYiFVa0",
                authDomain: "resale-iq.firebaseapp.com",
                projectId: "resale-iq",
                storageBucket: "resale-iq.firebasestorage.app",
                messagingSenderId: "496480241751",
                appId: "1:496480241751:web:148d1da5cd3e322edcbb12"
            });

            const auth = getAuth(app);
            const provider = new GoogleAuthProvider();

            onAuthStateChanged(auth, (user) => {
                const status = document.getElementById('statusMsg');
                const btn = document.getElementById('authBtn');
                const memberArea = document.getElementById('memberArea');

                if (user) {
                    status.innerHTML = `Welcome, <b>${user.displayName}</b>!`;
                    btn.style.display = 'none';
                    memberArea.style.display = 'block';
                } else {
                    status.innerText = "System ready.";
                    btn.style.display = 'block';
                    memberArea.style.display = 'none';
                    btn.onclick = () => signInWithPopup(auth, provider);
                }
            });

            document.getElementById('logoutBtn').onclick = () => signOut(auth);
        } catch (e) {
            document.getElementById('statusMsg').innerText = "Critical Error: " + e.message;
        }
    </script>
</body>
</html>
