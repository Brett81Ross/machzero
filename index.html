<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .logo { width: 250px; margin-bottom: 20px; }
        .badge { background: #0070f3; padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: inline-block; }
        .notice { color: #888; font-size: 13px; margin: 2px 0; }
        .pro-notice { font-weight: bold; color: #0070f3; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #333; color: #fff; font-size: 16px; cursor: pointer; }
        .secondary-btn { background: #444; font-size: 14px; padding: 10px; }
        #gallery { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        #gallery img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }
        #result { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: left; white-space: pre-wrap; font-size: 16px; line-height: 1.5; }
        #status { margin-top: 10px; color: #ffcc00; font-weight: bold; }
        #historyContainer { display: none; margin-top: 20px; text-align: left; }
        .history-item { background: #222; padding: 12px; margin-top: 10px; border-radius: 8px; font-size: 14px; border-left: 4px solid #0070f3; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo1.png" class="logo" alt="Logo">
        <div><span class="badge">Beta Version</span></div>
        <p class="notice">Free to use for early testers</p>
        <p class="notice pro-notice">✨ Pro Mode Coming Soon</p>
        
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
        <button class="btn" onclick="document.getElementById('fileInput').click()">📁 Select Photos</button>
        
        <button class="btn secondary-btn" onclick="toggleHistory()">🕒 View Recent History</button>
        
        <div id="gallery"></div>
        <div id="status"></div>
        <div id="result"></div>
        <div id="historyContainer"></div>
    </div>

    <script>
        const gallery = document.getElementById('gallery'), status = document.getElementById('status'), 
              result = document.getElementById('result'), hist = document.getElementById('historyContainer');

        function toggleHistory() { hist.style.display = (hist.style.display === 'block') ? 'none' : 'block'; }

        async function processImages(files) {
            gallery.innerHTML = ""; status.innerText = "Analyzing..."; result.innerText = "";
            let base64Array = [];
            
            for (const file of Array.from(files)) {
                const b64 = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        gallery.appendChild(img);
                        r(e.target.result.split(',')[1]);
                    };
                    reader.readAsDataURL(file);
                });
                base64Array.push(b64);
            }

            const res = await fetch('/api/analyze', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ imagesBase64: base64Array }) 
            });
            const data = await res.json();
            if (res.ok) {
                const text = data.candidates[0].content.parts[0].text;
                result.innerText = text; status.innerText = "Done!";
                let h = JSON.parse(localStorage.getItem('resaleHistory') || '[]');
                h.unshift(text); if (h.length > 5) h.pop();
                localStorage.setItem('resaleHistory', JSON.stringify(h));
            } else { status.innerText = "Error!"; }
        }

        document.getElementById('fileInput').onchange = (e) => processImages(e.target.files);
    </script>
</body>
</html>
