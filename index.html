<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; margin: 20px 0; }
        .btn { width: 100%; padding: 15px; background: #0070f3; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Resale IQ</h1>
    <div class="card">
        <p id="statusMsg">Connecting to system...</p>
        <div id="authArea" style="display:none;">
            <button class="btn" id="loginBtn">Sign In with Google</button>
        </div>
        <div id="memberArea" style="display:none;">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
            <button class="btn" onclick="document.getElementById('cameraInput').click()">📷 Take New Photo</button>
            <button class="btn" onclick="document.getElementById('fileInput').click()">📂 Choose Existing File</button>
            <br><br>
            <button class="btn" style="background:#444;" id="logoutBtn">Sign Out</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const app = initializeApp({
            apiKey: "AIzaSyCHw58VHbvQxji437vYTxgakBHdRYiFVa0",
            authDomain: "resale-iq.firebaseapp.com",
            projectId: "resale-iq",
            storageBucket: "resale-iq.firebasestorage.app",
            messagingSenderId: "496480241751",
            appId: "1:496480241751:web:148d1da5cd3e322edcbb12"
        });

        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Fallback: If it takes too long, just show the button anyway
        setTimeout(() => {
            if(document.getElementById('statusMsg').innerText === "Connecting to system...") {
                document.getElementById('statusMsg').innerText = "System ready (Manual mode).";
                document.getElementById('authArea').style.display = 'block';
            }
        }, 3000);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('statusMsg').innerText = `Welcome, ${user.displayName}`;
                document.getElementById('authArea').style.display = 'none';
                document.getElementById('memberArea').style.display = 'block';
            } else {
                document.getElementById('statusMsg').innerText = "Ready to Sign In.";
                document.getElementById('authArea').style.display = 'block';
                document.getElementById('memberArea').style.display = 'none';
                document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
            }
        });

        document.getElementById('logoutBtn').onclick = () => signOut(auth);
    </script>
</body>
</html>
