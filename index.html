<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MachZero</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .logo-container {
            margin-top: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 120px;
        }
        .logo-container img {
            max-width: 100%;
            height: auto;
            max-height: 120px;
            display: block;
        }
        .brand-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 4px;
            margin: 10px 0;
            text-transform: uppercase;
        }
        .brand-title span {
            color: #38bdf8;
        }
        .tagline {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.5;
            padding: 0 20px;
            margin-bottom: 30px;
        }
        .action-card {
            background-color: #1e293b;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .btn {
            display: block;
            width: 100%;
            background-color: #38bdf8;
            color: #0b0f19;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            cursor: pointer;
            box-sizing: border-box;
        }
        .btn:active {
            background-color: #0ea5e9;
        }
        .btn-secondary {
            background-color: #2563eb;
            color: #ffffff;
            margin-bottom: 0;
        }
        .btn-secondary:active {
            background-color: #1d4ed8;
        }
        .hidden-input {
            display: none;
        }
        .result-card {
            background-color: #1e293b;
            border-left: 4px solid #38bdf8;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            margin-top: 20px;
            position: relative;
        }
        .result-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .result-title {
            font-size: 14px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            font-weight: bold;
        }
        .copy-btn {
            background-color: #334155;
            color: #38bdf8;
            border: 1px solid #475569;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .copy-btn:active {
            background-color: #475569;
        }
        .result-text {
            font-size: 15px;
            line-height: 1.6;
            margin: 0;
            white-space: pre-wrap;
        }
        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #64748b;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="logo-container">
            <img src="logo1.jpg" alt="MachZero Logo">
        </div>
        <div class="brand-title">Mach<span>zero</span></div>
        <div class="tagline">
            Snap a photo or upload an image to instantly estimate its resale market value. Know what it's worth before you buy, sell, or pass it up.
        </div>

        <div class="action-card">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden-input" onchange="handleFileSelect(this)">
            <input type="file" id="fileInput" accept="image/*" class="hidden-input" onchange="handleFileSelect(this)">

            <button class="btn" onclick="document.getElementById('cameraInput').click()">Take Photo</button>
            <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">Upload Image</button>
        </div>

        <div class="result-card" id="outputCard" style="display: none;">
            <div class="result-title-row">
                <p class="result-title" id="statusHeader">Analysis Report</p>
                <button class="copy-btn" id="copyButton" onclick="copyToClipboard()">Copy</button>
            </div>
            <div class="result-text" id="analysisResult">Processing...</div>
        </div>

        <div class="footer">
            &copy; 2026 MachZero&trade;<br>
            Powered by CactusByte Studios &bull; All Rights Reserved
        </div>
    </div>

    <script>
        function copyToClipboard() {
            const textToCopy = document.getElementById('analysisResult').innerText;
            const copyBtn = document.getElementById('copyButton');
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                copyBtn.innerText = "Copied!";
                copyBtn.style.color = "#4ade80";
                setTimeout(() => {
                    copyBtn.innerText = "Copy";
                    copyBtn.style.color = "#38bdf8";
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }

        function handleFileSelect(input) {
            if (!input.files || !input.files[0]) return;
            
            const file = input.files[0];
            const resultCard = document.getElementById('outputCard');
            const statusHeader = document.getElementById('statusHeader');
            const textOutput = document.getElementById('analysisResult');
            const copyBtn = document.getElementById('copyButton');

            resultCard.style.display = 'block';
            copyBtn.style.display = 'none';
            statusHeader.innerText = "System Status";
            statusHeader.style.color = "#38bdf8";
            textOutput.innerText = "Scaling image layout constraints...";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function (event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = async function () {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const maxDimension = 1024;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height && width > maxDimension) {
                        height *= maxDimension / width;
                        width = maxDimension;
                    } else if (height > maxDimension) {
                        width *= maxDimension / height;
                        height = maxDimension;
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    textOutput.innerText = "Querying item values on Gemini 3.5 Engine...";

                    try {
                        const response = await fetch('/api/analyze', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ image: compressedBase64 })
                        });
                        
                        const contentType = response.headers.get("content-type");
                        if (!contentType || !contentType.includes("application/json")) {
                            throw new Error("Vercel routing fault. Make sure your GitHub folders are flattened completely.");
                        }

                        const data = await response.json();
                        
                        if (!response.ok || data.error) {
                            throw new Error(data.error || 'API execution crash.');
                        }
                        
                        statusHeader.innerText = "Analysis Report";
                        statusHeader.style.color = "#4ade80";
                        textOutput.innerText = data.result;
                        copyBtn.style.display = 'block';

                    } catch (err) {
                        statusHeader.innerText = "Error Status";
                        statusHeader.style.color = "#ef4444";
                        textOutput.innerText = err.message + "\n\nVerify that analyze.js sits directly within the root api/ directory.";
                        copyBtn.style.display = 'none';
                    }
                };
            };
        }
    </script>
</body>
</html>
