<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ - Pro UX</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .logo { width: 200px; margin: 0 auto 20px; display: block; }
        
        /* One-Tap Grid Layout */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 20px; border-radius: 15px; border: none; color: #fff; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .analyze-btn { background: #0070f3; }
        .camera-btn { background: #28a745; }
        
        .card { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        input { width: 90%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; }
        
        #result { background: #111; padding: 15px; border-radius: 15px; font-size: 14px; line-height: 1.6; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo1.png" class="logo" alt="Logo">
        
        <div class="card">
            <input type="number" id="costInput" placeholder="Sourcing Cost ($)">
        </div>

        <div class="action-grid">
            <button class="btn camera-btn" onclick="document.getElementById('cameraInput').click()">📷 Snap</button>
            <button class="btn analyze-btn" onclick="document.getElementById('fileInput').click()">📁 Browse</button>
        </div>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none;">
        
        <div id="result">Waiting for input...</div>
    </div>

    <script>
        let allImages = [];

        async function handleFiles(files) {
            const cost = document.getElementById('costInput').value || 0;
            allImages = []; 
            document.getElementById('result').innerText = "Processing images and optimizing for market...";
            
            for (const file of Array.from(files)) {
                const b64 = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            canvas.width = 800; canvas.height = img.height * (800 / img.width);
                            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                            r(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
                allImages.push(b64);
            }
            runAnalysis(cost);
        }

        async function runAnalysis(cost) {
            const res = await fetch('/api/analyze', { 
                method: 'POST', headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ imagesBase64: allImages }) 
            });
            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            document.getElementById('result').innerText = text;
        }

        document.getElementById('fileInput').onchange = (e) => handleFiles(e.target.files);
        document.getElementById('cameraInput').onchange = (e) => handleFiles(e.target.files);
    </script>
</body>
</html>
