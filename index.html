<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: #333; color: #fff; font-size: 16px; cursor: pointer; }
        .analyze-btn { background: #0070f3; font-weight: bold; }
        #preview { width: 100%; border-radius: 10px; margin: 10px 0; display: none; }
        #result { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: left; display: none; white-space: pre-wrap; font-size: 14px; }
        #status { margin-top: 10px; color: #ffcc00; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo1.png" style="width: 80px;" alt="Logo">
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        <button class="btn" onclick="document.getElementById('fileInput').click()">📷 Choose Item Photo</button>
        <img id="preview">
        <button id="analyzeBtn" class="btn analyze-btn">Analyze Item</button>
        <div id="status"></div>
        <div id="result"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput'),
              preview = document.getElementById('preview'),
              analyzeBtn = document.getElementById('analyzeBtn'),
              status = document.getElementById('status'),
              result = document.getElementById('result');

        fileInput.onchange = (e) => {
            preview.src = URL.createObjectURL(e.target.files[0]);
            preview.style.display = 'block';
            status.innerText = "";
        };

        analyzeBtn.onclick = async () => {
            if (!preview.src.startsWith('blob:')) return alert("Pick a photo first!");
            status.innerText = "Analyzing... (Please wait)";
            analyzeBtn.disabled = true;

            try {
                // Resize image
                const img = new Image();
                img.src = preview.src;
                await img.decode();
                const canvas = document.createElement('canvas');
                canvas.width = 800;
                canvas.height = img.height * (800 / img.width);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                const base64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

                // Fetch with manual timeout logic
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 20000);

                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ imageBase64: base64 }),
                    signal: controller.signal
                });
                
                clearTimeout(timeout);
                const data = await res.json();
                
                if (res.ok && data.candidates) {
                    result.innerText = data.candidates[0].content.parts[0].text;
                    result.style.display = 'block';
                    status.innerText = "Analysis Complete!";
                } else {
                    status.innerText = "Error: " + (data.error || "Unknown response");
                }
            } catch (e) {
                status.innerText = e.name === 'AbortError' ? "Error: Connection Timed Out" : "Error: " + e.message;
            } finally {
                analyzeBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
