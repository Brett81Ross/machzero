<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MachZero - AI Resale Estimator</title>
  <style>
    body {
      background-color: #0a1128;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      margin: 0;
      font-family: sans-serif;
      box-sizing: border-box;
    }
    .container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .header {
      text-align: center;
      margin-top: 30px;
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .logo {
      width: 180px;
      height: auto;
      margin-bottom: 20px;
      border-radius: 8px;
    }
    .title {
      font-size: 2.5rem;
      font-weight: bold;
      margin: 0 0 12px 0;
      letter-spacing: 1px;
    }
    .title span {
      color: #38bdf8;
    }
    .description {
      color: #94a3b8;
      max-width: 400px;
      margin: 0 auto;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .button-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .btn {
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-camera {
      background-color: #38bdf8;
      color: #000000;
    }
    .btn-upload {
      background-color: #2563eb;
      color: #ffffff;
    }
    .status-area {
      width: 100%;
      margin-top: 30px;
    }
    
    .loading-card {
      background-color: #1e293b;
      border-left: 4px solid #38bdf8;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .loading-card p {
      margin: 0;
      font-weight: bold;
      color: #38bdf8;
      font-size: 1.1rem;
      animation: pulseText 1.5s ease-in-out infinite;
    }
    
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(56, 189, 248, 0.2);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulseText {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .error-card {
      background-color: #1e293b;
      border-left: 4px solid #ef4444;
      border-radius: 8px;
      padding: 15px;
    }
    .error-card h4 {
      margin: 0 0 5px 0;
      color: #ef4444;
      text-transform: uppercase;
      font-size: 0.85rem;
    }
    .error-card p {
      margin: 0;
      font-size: 0.9rem;
      color: #cbd5e1;
      word-break: break-word;
    }
    .preview-card {
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
      border: 1px solid #334155;
      width: 100%;
    }
    .preview-card img {
      width: 100%;
      height: auto;
      display: block;
    }
    .result-card {
      background-color: #111827;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 20px;
    }
    .result-text {
      color: #e2e8f0;
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 0.95rem;
    }
    footer {
      margin-top: auto;
      padding-top: 40px;
      padding-bottom: 10px;
      text-align: center;
      font-size: 0.8rem;
      color: #64748b;
      width: 100%;
    }
    footer p {
      margin: 0;
    }
    footer p:first-child {
      margin-bottom: 4px;
    }
    #fileInput {
      display: none;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <img src="logo1.jpg" alt="MachZero Logo" class="logo" id="brandLogo">
      <h1 class="title">MACH<span>ZERO</span></h1>
      <p class="description">
        Snap a photo or upload an image to instantly estimate its resale market value. Know what it's worth before you buy, sell, or pass it up.
      </p>
    </div>

    <div class="button-group">
      <button class="btn btn-camera" id="cameraBtn">TAKE PHOTO</button>
      <button class="btn btn-upload" id="uploadBtn">UPLOAD IMAGE</button>
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="status-area" id="statusArea">
      <div id="loadingState" class="loading-card" style="display: none;">
        <div class="spinner"></div>
        <p>Analyzing Image...</p>
      </div>

      <div id="errorState" class="error-card" style="display: none;">
        <h4>Network Fault</h4>
        <p id="errorText"></p>
      </div>

      <div id="previewState" class="preview-card" style="display: none;">
        <img id="previewImg" src="" alt="Preview">
      </div>

      <div id="resultState" class="result-card" style="display: none;">
        <div id="resultText" class="result-text"></div>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 MachZero&trade;</p>
      <p>Powered by CactusByte Studios &bull; All Rights Reserved</p>
    </footer>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const cameraBtn = document.getElementById('cameraBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    
    const loadingState = document.getElementById('loadingState');
    const errorState = document.getElementById('errorState');
    const errorText = document.getElementById('errorText');
    const previewState = document.getElementById('previewState');
    const previewImg = document.getElementById('previewImg');
    const resultState = document.getElementById('resultState');
    const resultText = document.getElementById('resultText');
    const brandLogo = document.getElementById('brandLogo');

    brandLogo.onerror = () => { console.error("Logo asset logo1.jpg could not be loaded."); };

    cameraBtn.addEventListener('click', () => {
      resetUI();
      fileInput.setAttribute('capture', 'environment');
      fileInput.click();
    });

    uploadBtn.addEventListener('click', () => {
      resetUI();
      fileInput.removeAttribute('capture');
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      setLoading(true);

      // Speed Optimization: Render preview immediately via Object URL to eliminate browser freeze
      previewImg.src = URL.createObjectURL(file);
      previewState.style.display = 'block';

      const reader = new FileReader();
      reader.onloadend = () => {
        compressAndProcessImage(reader.result);
      };
      reader.onerror = () => {
        showError("Failed to process the chosen image file.");
        setLoading(false);
      };
      reader.readAsDataURL(file);
    });

    // High-Speed Canvas Compression Pipeline
    function compressAndProcessImage(base64Str) {
      const img = new Image();
      img.src = base64Str;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        
        // Dropped from 1200 to 800 for instant transmission speed
        const max_size = 800; 

        if (width > height) {
          if (width > max_size) {
            height *= max_size / width;
            width = max_size;
          }
        } else {
          if (height > max_size) {
            width *= max_size / height;
            height = max_size;
          }
        }

        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        // Quality adjusted to 0.70 for ultra-lean payload delivery
        const optimizedBase64 = canvas.toDataURL('image/jpeg', 0.70);
        sendToBackend(optimizedBase64);
      };
    }

    async function sendToBackend(base64Image) {
      try {
        const response = await fetch('/api/analyze', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ image: base64Image }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || data.details || 'Server error processing request');
        }

        resultText.textContent = data.analysis;
        resultState.style.display = 'block';
      } catch (err) {
        console.error(err);
        showError(err.message);
      } finally {
        setLoading(false);
      }
    }

    function setLoading(isLoading) {
      if (isLoading) {
        loadingState.style.display = 'flex';
        cameraBtn.disabled = true;
        uploadBtn.disabled = true;
      } else {
        loadingState.style.display = 'none';
        cameraBtn.disabled = false;
        uploadBtn.disabled = false;
      }
    }

    function showError(message) {
      errorText.textContent = message;
      errorState.style.display = 'block';
    }

    function resetUI() {
      errorState.style.display = 'none';
      previewState.style.display = 'none';
      resultState.style.display = 'none';
      
      // Revoke older object URLs safely to avoid memory leakage
      if (previewImg.src.startsWith('blob:')) {
        URL.revokeObjectURL(previewImg.src);
      }
      
      previewImg.src = '';
      resultText.textContent = '';
      errorText.textContent = '';
    }
  </script>
</body>
</html>
