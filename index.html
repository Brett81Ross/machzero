<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
</head>
<body>
    <img src="logo1.png" style="width: 80px;">
    <h1>Resale IQ</h1>
    <div id="app">
        <input type="file" id="fileInput" accept="image/*">
        <button id="analyzeBtn">Analyze Item</button>
        <div id="result"></div>
    </div>

    <script type="module">
        document.getElementById('analyzeBtn').onclick = async () => {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert("Select a photo!");
            document.getElementById('result').innerText = "Analyzing...";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = async () => {
                const base64 = reader.result.split(',')[1];
                try {
                    const res = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ imageBase64: base64 })
                    });
                    const data = await res.json();
                    document.getElementById('result').innerText = data.candidates[0].content.parts[0].text;
                } catch (e) {
                    document.getElementById('result').innerText = "Error: Backend unreachable.";
                }
            };
        };
    </script>
</body>
</html>
