<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MachZero - AI Resale Estimator</title>

  <meta property="og:title" content="MachZero - AI Resale Estimator">
  <meta property="og:description" content="Add multiple snapshots to a single batch for immediate, expert resale values and optimized marketplace descriptions.">
  <meta property="og:image" content="https://machzero-beta.vercel.app/logo1.jpg">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <style>
    :root {
      --bg-dark: #070b19;
      --card-bg: #111a36;
      --accent-blue: #38bdf8;
      --accent-green: #10b981;
      --accent-indigo: #3b82f6;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      
      /* MachZero Diagnostic Border Accents */
      --border-blue: #233a66;
      --border-indigo: #3c2475;
      --reverb-orange: #ea580c;
    }
    
    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      box-sizing: border-box;
    }
    
    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .header {
      text-align: center;
      margin-top: 24px;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }
    
    .logo {
      width: 140px;
      height: 140px;
      margin-bottom: 16px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      object-fit: cover;
      display: block;
    }
    
    .title {
      font-size: 2.2rem;
      font-weight: 900;
      margin: 0 0 8px 0;
      letter-spacing: 2px;
      color: var(--text-main);
    }
    
    .title span {
      color: var(--accent-blue);
    }
    
    .description {
      color: var(--text-muted);
      max-width: 360px;
      margin: 0 auto;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    
    .button-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--card-bg);
      padding: 16px;
      border-radius: 16px;
      box-sizing: border-box;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }
    
    .btn {
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s, background-color 0.2s;
    }
    
    .btn:active {
      transform: scale(0.98);
    }
    
    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-camera {
      background-color: var(--accent-blue);
      color: #020617;
    }
    
    .btn-upload {
      background-color: rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .btn-submit {
      background-color: var(--accent-green);
      color: #ffffff;
      margin-top: 4px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }
    
    .status-area {
      width: 100%;
      margin-top: 20px;
    }
    
    .loading-card {
      background-color: var(--card-bg);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    
    .loading-card p {
      margin: 0;
      font-weight: 600;
      color: var(--accent-blue);
      font-size: 1rem;
      animation: pulseText 1.5s ease-in-out infinite;
    }
    
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(56, 189, 248, 0.1);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulseText {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .error-card {
      background-color: #27161a;
      border: 1px solid #ef4444;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .error-card h4 {
      margin: 0 0 4px 0;
      color: #ef4444;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
    }
    
    .error-card p {
      margin: 0;
      font-size: 0.85rem;
      color: #fca5a5;
      word-break: break-word;
    }
    
    .preview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
      width: 100%;
    }
    
    .preview-item {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      aspect-ratio: 1 / 1;
      background-color: #020617;
    }
    
    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    
    .remove-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(15, 23, 42, 0.8);
      color: #ef4444;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      padding: 0;
    }

    /* PREMIUM ACELYNN-INSPIRED BRANDING WRAPPERS */
    .master-report-wrapper {
      display: none;
      width: 100%;
    }

      padding: 24px;
      border-radius: 12px;
      background
