<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resale IQ</title>
    <link rel="apple-touch-icon" href="logo1.png">
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #1a1d24;
            --primary: #3b82f6;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* App Header */
        .app-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            margin-top: 10px;
            width: 100%;
            max-width: 400px;
        }
        .app-header img {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .app-header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Image Card */
        .image-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .placeholder-text {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-size: 15px;
            font-weight: 500;
        }

        img.preview {
            width: 100%;
            border-radius: 16px;
            display: none;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Buttons */
        .button-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:active { transform: scale(0.96); }

        .btn-main { background: var(--primary); color: white; flex: 1; }
        .btn-secondary { background: #2d323e; color: white; flex: 1; }
        .btn-success {
            background: var(--success);
            color: white;
            font-size: 18px;
            padding: 18px;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        
        .btn-success:disabled {
            background: #2d323e;
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Result Section */
        #result-container {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            display: none;
