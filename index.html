<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResaleIQ</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .main-logo { width: 150px; height: 150px; object-fit: contain; }
        .btn { width: 100%; max-width: 300px; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-blue { background-color: #007bff; color: white; }
        .btn-green { background-color: #28a745; color: white; }
        #status-display { margin-top: 20px; padding: 15px; background: #222; border-radius: 10px; width: 100%; max-width: 300px; display: none; white-space: pre-wrap; }
    </style>
</head>
<body>
    <img src="logo1.png" alt="ResaleIQ" class="main-logo">
    <input type="file" id="file-input" style="display: none;" accept="image/*">
    <button class="btn btn-blue" id="gallery-btn">Select Photos</button>
    <button class="btn btn-green" id="camera-btn">Take Photo</button>
    <button class="btn" onclick="listModels()" style="background-color: #555;">Check Available Models</button>
    <div id="status-display"></div>

    <script>
        const API_KEY = 'AIzaSyBzcnjEsoze4PGMiTD6usC4PXIiYKUlJK8';

        async function listModels() {
            const status = document.getElementById('status-display');
            status.style.display = 'block';
            status.textContent = "Fetching available models...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${API_KEY}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                status.textContent = "Available Models:\n" + data.models.map(m => m.name).join('\n');
            } catch (err) {
                status.textContent = "Error listing models: " + err.message;
            }
        }

        document.getElementById('gallery-btn').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('camera-btn').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => upload(e.target.files[0]));

        async function upload(file) {
            const status = document.getElementById('status-display');
            status.style.display = 'block';
            status.textContent = "Processing...";
            const reader = new FileReader();
            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: "Describe this item." }, { inline_data: { mime_type: "image/jpeg", data: base64Data } }] }]
                        })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    status.textContent = data.candidates[0].content.parts[0].text;
                } catch (err) {
                    status.textContent = "Error: " + err.message + "\n\n(Click 'Check Available Models' to see the correct names)";
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
