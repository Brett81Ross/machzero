<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MachZero - AI Asset Appraiser</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117;
            color: #f0f6fc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        .logo-container {
            margin-top: 30px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .brand-logo {
            width: 120px;
            height: auto;
            display: block;
        }
        .brand-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 10px 0;
            text-transform: uppercase;
            color: #ffffff;
        }
        .brand-title span {
            color: #58a6ff;
        }
        .tagline {
            font-size: 14px;
            color: #8b949e;
            line-height: 1.5;
            padding: 0 15px;
            margin-bottom: 30px;
        }
        .action-card {
            background-color: #161b22;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid #30363d;
        }
        .btn {
            display: block;
            width: 100%;
            background-color: #58a6ff;
            color: #0d1117;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            cursor: pointer;
            box-sizing: border-box;
            text-align: center;
        }
        .btn:last-child {
            margin-bottom: 0;
        }
        .btn-secondary {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }
        .hidden-input {
            display: none;
        }
        .result-card {
            background-color: #161b22;
            border-left: 4px solid #58a6ff;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            margin-top: 20px;
        }
        .result-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .result-title {
            font-size: 13px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
            font-weight: bold;
        }
        .copy-btn {
            background-color: #0d1117;
            color: #58a6ff;
            border: 1px solid #30363d;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .result-text {
            font-size: 15px;
            line-height: 1.6;
            margin: 0;
            white-space: pre-wrap;
            color: #c9d1d9;
        }
        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #8b949e;
            letter-spacing: 0.5px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="logo-container">
            <img src="logo1.png" alt="MachZero Logo" class="brand-logo">
        </div>
        <div class="brand-title">Mach<span>Zero</span></div>
        <div class="tagline">
            Snap a photo or upload an image to instantly estimate its resale market value. Know what it's worth before you buy, sell, or pass it up.
        </div>

        <div class="action-card">
            <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden-input" onchange="handleFiles(this.files)">
            <input type="file" id="fileInput" accept="image/*" class="hidden-input" onchange="handleFiles(this.files)">

            <button class="btn" onclick="document.getElementById('cameraInput').click()">Take Photo</button>
            <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">Upload Image</button>
        </div>

        <div class="result-card" id="outputCard" style="display: none;">
            <div class="result-title-row">
                <p class="result-title" id="statusHeader">Analysis Output</p>
                <button class="copy-btn" id="copyButton" onclick="copyToClipboard()">Copy</button>
            </div>
            <div class="result-text" id="analysisResult">Processing Matrix Data...</div>
        </div>

        <div class="footer">
            &copy; 2026 MachZero&trade;<br>
            Powered by CactusByte Studios &bull; All Rights Reserved
        </div>
    </div>

    <script>
        function copyToClipboard() {
            const textToCopy = document.getElementById('analysisResult').innerText;
            const copyBtn = document.getElementById('copyButton');
            navigator.clipboard.writeText(textToCopy).then(() => {
                copyBtn.innerText = "Copied!";
                setTimeout(() => { copyBtn.innerText = "Copy"; }, 2000);
            });
        }

        async function handleFiles(files) {
            if (!files || files.length === 0) return;

            const resultCard = document.getElementById('outputCard');
            const statusHeader = document.getElementById('statusHeader');
            const textOutput = document.getElementById('analysisResult');

            resultCard.style.display = 'block';
            statusHeader.innerText = "Network Status";
            statusHeader.style.color = "#58a6ff";
            textOutput.innerText = "Compressing high-resolution asset framework...";

            try {
                const base64Str = await resizeAndCompressImage(files[0]);

                textOutput.innerText = "Pinging valuation index matrices...";

                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Str })
                });

                const data = await response.json();

                if (!response.ok || data.error) {
                    throw new Error(data.error || 'Server endpoint execution anomaly.');
                }

                statusHeader.innerText = "MachZero Valuation Report";
                statusHeader.style.color = "#4ade80";
                textOutput.innerText = data.result;

            } catch (err) {
                statusHeader.innerText = "Network Fault";
                statusHeader.style.color = "#ef4444";
                textOutput.innerText = err.message;
            }
        }

        function resizeAndCompressImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = function (event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = function () {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        const maxDimension = 1024;
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height && width > maxDimension) {
                            height *= maxDimension / width;
                            width = maxDimension;
                        } else if (height > maxDimension) {
                            width *= maxDimension / height;
                            height = maxDimension;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.onerror = (err) => reject(err);
                };
                reader.onerror = (err) => reject(err);
            });
        }
    </script>
</body>
</html>
