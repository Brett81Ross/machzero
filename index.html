<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resale IQ</title>
    <link class="apple-touch-icon" href="logo1.png">
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #111; padding: 20px; border-radius: 20px; border: 1px solid #333; margin: 20px 0; }
        img.preview { width: 100%; border-radius: 12px; display: none; margin-bottom: 10px; }
        
        .button-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .button-row button { flex: 1; }
        
        button { width: 100%; padding: 15px; margin: 5px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-main { background: #0070f3; color: white; }
        .btn-secondary { background: #333; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        
        #result { margin-top: 20px; text-align: left; line-height: 1.5; font-size: 16px; }
        #authSection { margin-bottom: 20px; font-size: 14px; color: #aaa; }
        .badge { background: #333; padding: 4px 8px; border-radius: 20px; font-size: 12px; color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <img src="logo1.png" style="width: 80px; margin-bottom: 10px;">
    <h1 style="margin-top: 0;">Resale IQ</h1>
    
    <div id="authSection" class="card" style="margin: 10px 0; padding: 12px;">
        <span id="authStatus">Loading account status...</span>
        <button id="authBtn" class="btn-main" style="width: auto; padding: 8px 15px; margin-left: 10px; display: none; font-size: 14px;"></button>
    </div>

    <div id="appInterface" style="display: none;">
        <div class="card">
            <img id="preview" class="preview">
            
            <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
            <input type="file" id="galleryInput" accept="image/*" style="display:none;">
            
            <div class="button-row">
                <button class="btn-main" onclick="document.getElementById('cameraInput').click()">📷 Take Photo</button>
                <button class="btn-secondary" onclick="document.getElementById('galleryInput').click()">📂 Choose File</button>
            </div>
            
            <button id="analyzeBtn" class="btn-success" style="display:none;" onclick="analyze()">🔍 Get Value</button>
        </div>
    </div>
    
    <div id="result"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your verified Firebase connection details
        const firebaseConfig = {
            apiKey: "AIzaSyCHw58VHbvQxji437vYTxgakBHdRYiFVa0",
            authDomain: "resale-iq.firebaseapp.com",
            projectId: "resale-iq",
            storageBucket: "resale-iq.firebasestorage.app",
            messagingSenderId: "496480241751",
            appId: "1:496480241751:web:148d1da5cd3e322edcbb12",
            measurementId: "G-0D3NL4Z2YC"
        };

        // Initialize Firebase services
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let base64 = "";

        // UI Element Selectors
        const authStatus = document.getElementById('authStatus');
        const authBtn = document.getElementById('authBtn');
        const appInterface = document.getElementById('appInterface');
        const resultDiv = document.getElementById('result');
        const btn = document.getElementById('analyzeBtn');

        // Monitor User Authentication State Changes
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                appInterface.style.display = 'block';
                authBtn.style.display = 'inline-block';
                authBtn.innerText = "Log Out";
                authBtn.className = "btn-secondary";
                authBtn.onclick = () => signOut(auth);

                // Check and pull user's scan count from database
                const userDocRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userDocRef);
                let currentScans = 0;

                if (userDoc.exists()) {
                    currentScans = userDoc.data().scanCount || 0;
                } else {
                    // Create base account sheet if it's their very first login
                    await setDoc(userDocRef, { email: user.email, scanCount: 0, premium: false });
                }

                authStatus.innerHTML = `Signed in as: <b>${user.displayName}</b> <span class="badge">${currentScans}/3 Free Scans Used</span>`;
            } else {
                currentUser = null;
                appInterface.style.display = 'none';
                resultDiv.innerHTML = "";
                authStatus.innerHTML = "Please log in to claim your 3 free monthly scans.";
                authBtn.style.display = 'inline-block';
                authBtn.innerText = "Sign In with Google";
                authBtn.className = "btn-main";
                authBtn.onclick = () => signInWithPopup(auth, provider).catch(err => alert("Login Error: " + err.message));
            }
        });

        // Photo processing engine
        function processImage(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800; 
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scale;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    base64 = dataUrl.split(',')[1];

                    document.getElementById('preview').src = dataUrl;
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('analyzeBtn').style.display = 'block';
                    resultDiv.innerText = ""; 
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('cameraInput').onchange = processImage;
        document.getElementById('galleryInput').onchange = processImage;

        // Secure Analyze Function with Database Gatekeeping
        window.analyze = async function() {
            if (!currentUser) return alert("Please log in first!");

            btn.disabled = true;
            resultDiv.innerText = "Checking account status...";

            try {
                const userDocRef = doc(db, "users", currentUser.uid);
                const userDoc = await getDoc(userDocRef);
                
                let scanCount = 0;
                let isPremium = false;

                if (userDoc.exists()) {
                    scanCount = userDoc.data().scanCount || 0;
                    isPremium = userDoc.data().premium || false;
                }

                // If they hit their limit and aren't paid up, throw the paywall
                if (scanCount >= 3 && !isPremium) {
                    resultDiv.innerHTML = `
                        <div class="card" style="border-color: #0070f3; background: #111;">
                            <h3 style="color: #0070f3; margin-top:0;">🔒 Monthly Limit Reached</h3>
                            <p>You have used your 3 free monthly scans. Upgrade to premium for unlimited item evaluations, historical logs, and priority response times!</p>
                            <button class="btn-success" onclick="alert('Stripe Integration Coming Next!')">🚀 Go Premium - $9.99/mo</button>
                        </div>
                    `;
                    return;
                }

                resultDiv.innerText = "Analyzing... please wait.";

                // Fire query off to your Vercel backend route
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ image: base64 })
                });

                if (!res.ok) throw new Error(`Server connection failed (Code: ${res.status}).`);
                const data = await res.json();
                if (data.error) throw new Error(data.error);

                // Log and save user scan use inside the database counter
                await updateDoc(userDocRef, { scanCount: increment(1) });
                
                // Live update the badge counter visually
                const updatedCount = scanCount + 1;
                authStatus.innerHTML = `Signed in as: <b>${currentUser.displayName}</b> <span class="badge">${updatedCount}/3 Free Scans Used</span>`;

                let text = data.candidates[0].content.parts[0].text;
                resultDiv.innerHTML = text.replace(/###\s/g, '').replace(/\n/g, '<br>');
                resultDiv.innerHTML += '<br><button class="btn-secondary" id="copyBtn" style="margin-top:15px;">📋 Copy Listing</button>';
                
                document.getElementById('copyBtn').onclick = () => {
                    const cleanText = resultDiv.innerText.replace("📋 Copy Listing", "");
                    navigator.clipboard.writeText(cleanText).then(() => alert("Copied to clipboard!"));
                };

            } catch (error) {
                resultDiv.innerHTML = `<b>Error:</b> ${error.message}`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
