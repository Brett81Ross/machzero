<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResaleIQ</title>
    <style>
        html, body { margin: 0; padding: 0; min-height: 100%; background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .app-container { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; }
        .brand-header { width: 100%; text-align: center; padding: 20px 0; background-color: #000; }
        .main-logo { width: 150px; height: 150px; object-fit: contain; margin: 0 auto; display: block; }
        .promo-banner { border-bottom: 1px solid #333; color: #ffffff; text-align: center; padding: 12px; font-size: 0.85rem; }
        .content-area { flex: 1; padding: 20px; }
        .profit-card { background-color: #161616; border-radius: 16px; padding: 24px; text-align: center; margin-bottom: 20px; position: relative; }
        .profit-amount { color: #2ecc71; font-size: 2.5rem; font-weight: bold; margin: 5px 0; }
        .input-group { position: relative; margin-bottom: 16px; }
        .app-input { width: 100%; background-color: #161616; border: 1px solid #333; border-radius: 12px; padding: 16px; font-size: 1rem; color: #ffffff; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; font-size: 1rem; font-weight: 600; border: none; cursor: pointer; color: #ffffff; margin-bottom: 12px; }
        .btn-blue { background-color: #007aff; }
        .btn-green { background-color: #34c759; }
        .btn-orange { background-color: #ff9f0a; }
        .info-trigger { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #007aff; font-size: 1.2rem; cursor: pointer; padding: 8px; }
        .section-label { font-size: 1.1rem; font-weight: 600; margin: 24px 0 16px 0; }
        .hidden-uploader { position: absolute !important; opacity: 0 !important; width: 1px !important; height: 1px !important; overflow: hidden !important; }
        #status-display { background-color: #1c1c1e; border-radius: 12px; padding: 20px; margin: 16px 0; font-size: 0.95rem; border-left: 4px solid #007aff; display: none; }
        .log-item { background-color: #161616; border-radius: 12px; padding: 16px; margin-bottom: 8px; border-left: 4px solid #34c759; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="brand-header">
            <img src="logo1.png" alt="ResaleIQ" class="main-logo">
            <div class="promo-banner">100% FREE for Early Testers</div>
        </div>

        <div class="content-area">
            <div class="profit-card">
                <div style="color:#8a8a8f; font-size:0.8rem; text-transform: uppercase;">Net Profit</div>
                <p class="profit-amount">$0.00</p>
                <button class="info-trigger" onclick="alert('Net Profit is your total take-home earnings.')">ⓘ</button>
            </div>

            <div class="input-group">
                <input type="number" class="app-input" placeholder="Sourcing Cost ($)">
                <button class="info-trigger" onclick="alert('Enter the exact amount you paid for the item.')">ⓘ</button>
            </div>

            <input type="file" id="file-gallery" class="hidden-uploader" accept="image/*">
            <input type="file" id="file-camera" class="hidden-uploader" accept="image/*" capture="environment">

            <button class="btn btn-blue" onclick="document.getElementById('file-gallery').click()">Select Photos</button>
            <button class="btn btn-green" onclick="document.getElementById('file-camera').click()">Take Photo</button>

            <div id="status-display"></div>

            <div class="section-label">Add Expense</div>
            <div class="input-group"><input type="text" class="app-input" placeholder="Description (e.g., Mileage)"></div>
            <div class="input-group"><input type="number" class="app-input" placeholder="Amount ($)"></div>
            <button class="btn btn-orange">Add Expense</button>

            <div class="section-label">Inventory Log</div>
            <div id="inventory-log"></div>
        </div>
    </div>

    <script>
        // AI Logic placeholder - Add your API key below
        const API_KEY = 'AIzaSyCp54LGv8iu-IxPbpaoakU83OZNMheErCA';
        
        function handleFile(file) {
            const statusDiv = document.getElementById('status-display');
            statusDiv.style.display = 'block';
            statusDiv.textContent = "Processing " + file.name + "...";
            // ... Add your fetch logic here
        }

        document.getElementById('file-gallery').addEventListener('change', (e) => handleFile(e.target.files[0]));
        document.getElementById('file-camera').addEventListener('change', (e) => handleFile(e.target.files[0]));
    </script>
</body>
</html>
