<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MachZero</title>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; }
        .app-container { max-width: 500px; margin: 0 auto; }
        
        /* Android UI Cards */
        .card { background: #1c1c1e; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .main-logo { width: 150px; display: block; margin: 0 auto 20px; }
        
        .btn-main { width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        .bg-blue { background: #007aff; color: white; }
        
        /* Hide sections until needed */
        #results-area { display: none; }
        
        .result-val { font-size: 2rem; color: #34c759; font-weight: bold; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="app-container">
        <img src="logo1.jpg" alt="MachZero" class="main-logo">

        <div class="card" id="input-area">
            <button class="btn-main bg-blue" onclick="document.getElementById('camera-input').click()">START ANALYSIS</button>
            <input type="file" id="camera-input" class="hidden-uploader" accept="image/*" capture="environment" style="display:none">
        </div>

        <div class="card" id="results-area">
            <div style="color: #888; text-align: center;">AI MARKET VALUE</div>
            <div class="result-val" id="net-profit">$0.00</div>
            <input type="number" id="sourcing-cost" placeholder="Enter Sourcing Cost ($)" style="width:100%; padding:15px; border-radius:10px; border:1px solid #333; background:#2c2c2e; color:#fff; box-sizing:border-box;">
        </div>
    </div>

    <script>
        // Simple logic to show results when file is picked
        document.getElementById('camera-input').addEventListener('change', function() {
            document.getElementById('results-area').style.display = 'block';
            // Trigger your analysis function here
        });
    </script>
</body>
</html>
